name: Build & Release

on:
  push:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. Java 17 untuk Setup Android SDK (SDK Manager butuh ini)
    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # 2. Switch ke Java 11 untuk Compile (Gradle 6.5 butuh ini)
    - name: Set up Java 11
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Clone Deagle Dependency & Fix missing dependencies
      run: |
        git clone https://github.com/oasisfeng/deagle.git ../deagle
        cat << 'DEP' >> ../deagle/library/build.gradle
        dependencies {
            implementation 'com.google.android.material:material:1.3.0'
            implementation 'androidx.appcompat:appcompat:1.3.1'
            implementation 'androidx.recyclerview:recyclerview:1.2.1'
        }
        DEP

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Generate Temporary Keystore
      run: |
        keytool -genkey -v -keystore debug.jks -keyalg RSA -keysize 2048 -validity 10000 -alias myalias -storepass password123 -keypass password123 -dname "CN=Unknown, OU=Unknown, O=Unknown, L=Unknown, ST=Unknown, C=Unknown"

    - name: Build Release APK
      # Saya tambahkan parameter '-x lint' dari blok conflict sebelumnya untuk mempercepat build
      run: ./gradlew assembleRelease -x lint
      env:
        SKIP_JDK_VERSION_CHECK: "true"

    # 3. Manual Signing (Lebih stabil untuk keystore lokal hasil generate)
    - name: Sign APK manually
      run: |
        APK_PATH=$(find mobile/build/outputs/apk/release/ -name "*.apk" ! -name "*unsigned*" | head -n 1)
        BUILD_TOOLS_PATH=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
        $BUILD_TOOLS_PATH/apksigner sign --ks debug.jks --ks-pass pass:password123 --out mobile/build/outputs/apk/release/Island-Mod-Signed.apk $APK_PATH

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Signed-APK
        path: mobile/build/outputs/apk/release/Island-Mod-Signed.apk

    - name: Automatic Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
      with:
        tag_name: latest-build
        files: mobile/build/outputs/apk/release/Island-Mod-Signed.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Sign APK manually
      run: |
        APK_PATH=$(find mobile/build/outputs/apk/release/ -name "*.apk" ! -name "*unsigned*" | head -n 1)
        BUILD_TOOLS_PATH=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
        $BUILD_TOOLS_PATH/apksigner sign --ks debug.jks --ks-pass pass:password123 --out mobile/build/outputs/apk/release/Island-Mod-Signed.apk $APK_PATH

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Signed-APK
        path: mobile/build/outputs/apk/release/Island-Mod-Signed.apk

    - name: Automatic Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
      with:
        tag_name: latest-build
        files: mobile/build/outputs/apk/release/Island-Mod-Signed.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
