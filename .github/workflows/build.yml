name: Build & Release

on:
  push:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # Use Java 17 initially so android-actions/setup-android@v3 works
    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # Switch back to Java 11 because Gradle 6.5 fails on Java 17
    - name: Set up Java 11
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Clone Deagle Dependency & Fix missing dependencies
      run: |
        git clone https://github.com/oasisfeng/deagle.git ../deagle
        cat << 'DEP' >> ../deagle/library/build.gradle
        dependencies {
            implementation 'com.google.android.material:material:1.3.0'
            implementation 'androidx.appcompat:appcompat:1.3.1'
            implementation 'androidx.recyclerview:recyclerview:1.2.1'
        }
        DEP

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Generate Keystore
      run: |
        keytool -genkey -v -keystore debug.jks -keyalg RSA -keysize 2048 -validity 10000 -alias myalias -storepass password123 -keypass password123 -dname "CN=Unknown, OU=Unknown, O=Unknown, L=Unknown, ST=Unknown, C=Unknown"

    - name: Setup Dummy Deagle Artifacts
      run: |
        mkdir -p ../deagle/library/build/intermediates/data_binding_export_class_list/release/out
        touch ../deagle/library/build/intermediates/data_binding_export_class_list/release/out/_class_list.txt

    - name: Build Release APK
      run: JAVA_HOME=$JAVA_HOME_11_X64 ./gradlew assembleRelease -x :deagle:compileReleaseJavaWithJavac

    - name: Sign APK
      uses: r0adkll/sign-android-release@v1
      with:
        releaseDirectory: mobile/build/outputs/apk/release
        signingKeyBase64: "" # Not using base64 key
        signingKey: debug.jks
        alias: myalias
        keyStorePassword: password123
        keyPassword: password123
      env:
        BUILD_TOOLS_VERSION: "30.0.3"
        SKIP_JDK_VERSION_CHECK: "true"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Signed-APK
        path: mobile/build/outputs/apk/release/*-signed.apk

    - name: Automatic Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: latest-build
        files: mobile/build/outputs/apk/release/*-signed.apk
        generate_release_notes: true
