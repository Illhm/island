name: Build and Release Island-Mod

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Checkout deagle dependency
        uses: actions/checkout@v3
        with:
          repository: oasisfeng/deagle
          path: ../deagle

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore island-mod-key.jks -alias island-mod -keyalg RSA -keysize 2048 -validity 10000 -storepass "island123!" -keypass "island123!" -dname "CN=Island Mod, OU=Android, O=OasisFeng, L=Unknown, S=Unknown, C=US"

      - name: Sign Android APK
        run: |
          # Find the unsigned release APK
          APK_PATH=$(find mobile/build/outputs/apk/release -name "*-unsigned.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find mobile/build/outputs/apk/release -name "*.apk" | head -n 1)
          fi

          # Zipalign the APK
          /usr/local/lib/android/sdk/build-tools/30.0.3/zipalign -v -p 4 $APK_PATH mobile/build/outputs/apk/release/island-mod-aligned.apk

          # Sign the APK using the dynamically generated keystore
          /usr/local/lib/android/sdk/build-tools/30.0.3/apksigner sign --ks island-mod-key.jks --ks-pass pass:island123! --key-pass pass:island123! --out mobile/build/outputs/apk/release/island-mod-signed.apk mobile/build/outputs/apk/release/island-mod-aligned.apk

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Island-Mod-Signed-APK
          path: mobile/build/outputs/apk/release/island-mod-signed.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: mobile/build/outputs/apk/release/island-mod-signed.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
